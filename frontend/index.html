<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Analyzer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <header>
      <h1>Resume Analyzer</h1>
      <p>Upload your resume and paste a job description to get AI-powered feedback</p>
    </header>

    <!-- INPUT FORM -->
    <section class="card" id="input-section">
      <div class="form-group">
        <label for="resume">Resume (PDF only)</label>
        <div class="file-drop" id="file-drop">
          <input type="file" id="resume" accept=".pdf" hidden />
          <span id="file-label">Click to upload or drag & drop</span>
        </div>
      </div>

      <div class="form-group">
        <label for="jd">Job Description</label>
        <textarea id="jd" rows="8" placeholder="Paste the full job description here..."></textarea>
      </div>

      <button id="analyze-btn" onclick="analyzeResume()">
        Analyze Resume
      </button>
    </section>

    <!-- LOADING STATE -->
    <section class="card hidden" id="loading-section">
      <div class="loader"></div>
      <p>Analyzing your resume with AI...</p>
    </section>

    <!-- RESULTS -->
    <section class="card hidden" id="results-section">

      <div class="score-row">
        <div class="score-circle">
          <span id="fit-score">0</span>
          <small>Fit Score</small>
        </div>
        <div id="summary-text" class="summary"></div>
      </div>

      <div class="two-col">
        <div class="result-block strengths">
          <h3>✅ Strengths</h3>
          <ul id="strengths-list"></ul>
        </div>
        <div class="result-block improvements">
          <h3>🔧 Improvements</h3>
          <ul id="improvements-list"></ul>
        </div>
      </div>

      <div class="result-block cover-letter">
        <div class="cover-header">
          <h3>📄 Cover Letter</h3>
          <button onclick="copyCoverLetter()">Copy</button>
        </div>
        <p id="cover-letter-text"></p>
      </div>

      <button onclick="resetForm()">Analyze Another Resume</button>

    </section>

    <!-- ERROR -->
    <div class="error hidden" id="error-box"></div>

  </div>

  <script src="app.js"></script>
</body>
</html>
