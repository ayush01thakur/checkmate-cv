services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-analysis-backend

    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    networks:
      - app-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-analyser-frontend
    ports:
      - "80:80"

    depends_on:
      - backend
    
    networks:
      - app-network

    restart: unless-stopped

networks:
  app-network:
    driver: bridge